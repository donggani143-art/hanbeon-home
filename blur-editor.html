<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>블러 박스 좌표 에디터</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 헤더 ── */
    .editor-header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .editor-header h1 {
      font-size: 1.1rem;
      font-weight: 800;
      color: #f8fafc;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .editor-header h1 i { color: #03c75a; }

    .header-select-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-wrap: wrap;
    }
    .header-select-wrap label { font-size: .82rem; color: #94a3b8; }
    select {
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: .85rem;
      cursor: pointer;
    }
    select:focus { outline: 2px solid #03c75a; }

    /* ── 메인 레이아웃 ── */
    .editor-body {
      display: flex;
      flex: 1;
      gap: 0;
      overflow: hidden;
    }

    /* ── 캔버스 영역 ── */
    .canvas-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px;
      overflow: auto;
      background: #020617;
    }

    .canvas-wrap {
      position: relative;
      display: inline-block;
      cursor: crosshair;
      user-select: none;
      border: 2px solid #334155;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    .canvas-wrap img {
      display: block;
      max-width: min(600px, 90vw);
      height: auto;
    }

    /* 블러 박스 오버레이 */
    .blur-overlay {
      position: absolute;
      border: 2.5px solid #03c75a;
      background: rgba(3,199,90,.08);
      cursor: move;
      z-index: 10;
      border-radius: 4px;
    }
    .blur-overlay::before {
      content: '⠿ 블러 영역';
      position: absolute;
      top: -22px;
      left: 0;
      background: #03c75a;
      color: #fff;
      font-size: .68rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px 4px 0 0;
      white-space: nowrap;
    }

    /* 리사이즈 핸들 8개 */
    .resize-handle {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #03c75a;
      border: 2px solid #fff;
      border-radius: 2px;
      z-index: 20;
    }
    .resize-handle.nw { top:-5px; left:-5px; cursor:nw-resize; }
    .resize-handle.n  { top:-5px; left:50%; transform:translateX(-50%); cursor:n-resize; }
    .resize-handle.ne { top:-5px; right:-5px; cursor:ne-resize; }
    .resize-handle.e  { top:50%; right:-5px; transform:translateY(-50%); cursor:e-resize; }
    .resize-handle.se { bottom:-5px; right:-5px; cursor:se-resize; }
    .resize-handle.s  { bottom:-5px; left:50%; transform:translateX(-50%); cursor:s-resize; }
    .resize-handle.sw { bottom:-5px; left:-5px; cursor:sw-resize; }
    .resize-handle.w  { top:50%; left:-5px; transform:translateY(-50%); cursor:w-resize; }

    /* ── 사이드바 ── */
    .sidebar {
      width: 320px;
      flex-shrink: 0;
      background: #1e293b;
      border-left: 1px solid #334155;
      display: flex;
      flex-direction: column;
      overflow: auto;
    }

    .sidebar-section {
      padding: 20px;
      border-bottom: 1px solid #334155;
    }
    .sidebar-section h3 {
      font-size: .82rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 14px;
    }

    /* 좌표 슬라이더 그룹 */
    .coord-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .coord-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .coord-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .coord-label span {
      font-size: .82rem;
      font-weight: 600;
      color: #cbd5e1;
    }
    .coord-val {
      font-size: .88rem;
      font-weight: 800;
      color: #03c75a;
      min-width: 52px;
      text-align: right;
    }
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 99px;
      background: #334155;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #03c75a;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(3,199,90,.4);
      cursor: grab;
    }
    input[type=range]::-webkit-slider-thumb:active { cursor: grabbing; }

    /* 숫자 직접 입력 */
    .coord-input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }
    .coord-input-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .coord-input-item label {
      font-size: .72rem;
      color: #64748b;
      font-weight: 600;
    }
    .coord-input-item input[type=number] {
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: .85rem;
      font-weight: 700;
      width: 100%;
      transition: border-color .2s;
    }
    .coord-input-item input[type=number]:focus {
      outline: none;
      border-color: #03c75a;
    }

    /* 코드 출력 */
    .code-box {
      background: #020617;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 14px;
      font-family: 'Courier New', monospace;
      font-size: .78rem;
      color: #7dd3fc;
      line-height: 1.6;
      word-break: break-all;
      position: relative;
    }
    .code-box .prop-name { color: #f59e0b; }
    .code-box .prop-val  { color: #86efac; }

    /* 복사 버튼 */
    .btn-copy {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #03c75a;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      margin-top: 12px;
      transition: background .2s, transform .15s;
    }
    .btn-copy:hover { background: #02b050; }
    .btn-copy:active { transform: scale(.97); }
    .btn-copy.copied { background: #0284c7; }

    /* 적용 버튼 */
    .btn-apply {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #1d4ed8;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      margin-top: 8px;
      transition: background .2s;
    }
    .btn-apply:hover { background: #1e40af; }

    /* 미리보기 버튼 */
    .btn-preview {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #7c3aed;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      margin-top: 8px;
      transition: background .2s;
    }
    .btn-preview:hover { background: #6d28d9; }

    /* 전체 저장 버튼 */
    .btn-save-all {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #0f172a;
      color: #03c75a;
      border: 2px solid #03c75a;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      width: calc(100% - 40px);
      margin: 16px 20px 0;
      justify-content: center;
      transition: all .2s;
    }
    .btn-save-all:hover {
      background: #03c75a;
      color: #fff;
    }

    /* 모든 좌표 목록 */
    .coord-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .coord-list-item {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .78rem;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .coord-list-item:hover {
      border-color: #03c75a;
      background: rgba(3,199,90,.06);
    }
    .coord-list-item.current {
      border-color: #03c75a;
      background: rgba(3,199,90,.1);
    }
    .coord-list-item .item-name {
      font-weight: 700;
      color: #f8fafc;
      font-size: .82rem;
    }
    .coord-list-item .item-coords {
      color: #64748b;
      font-family: monospace;
      font-size: .72rem;
    }

    /* 토스트 */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #03c75a;
      color: #fff;
      padding: 12px 24px;
      border-radius: 99px;
      font-size: .88rem;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      z-index: 9999;
      transition: transform .3s ease;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* 안내 */
    .guide-tip {
      background: rgba(3,199,90,.07);
      border: 1px solid rgba(3,199,90,.2);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .78rem;
      color: #86efac;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .guide-tip i { color: #03c75a; margin-right: 4px; }

    /* 블러 미리보기 canvas */
    .preview-canvas {
      display: block;
      max-width: min(600px, 90vw);
      border-radius: 8px;
      margin-top: 12px;
    }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header class="editor-header">
  <h1><i class="fas fa-crosshairs"></i> 블러 박스 좌표 에디터</h1>
  <div class="header-select-wrap">
    <label>이미지 선택:</label>
    <select id="imgSelect">
      <option value="판교치과">판교치과</option>
      <option value="길동역치과">길동역치과</option>
      <option value="가락동치과">가락동치과</option>
      <option value="진천치과" selected>진천치과</option>
      <option value="수유역치과">수유역치과</option>
      <option value="명일동치과">명일동치과</option>
      <option value="광명피부과">광명피부과</option>
    </select>
  </div>
</header>

<!-- ── 메인 ── -->
<div class="editor-body">

  <!-- 캔버스 패널 -->
  <div class="canvas-panel">
    <div class="guide-tip" id="canvasGuide">
      <i class="fas fa-info-circle"></i>
      <strong>초록 박스</strong>를 <strong>드래그</strong>로 이동 · <strong>모서리/테두리 핸들</strong>로 크기 조정<br/>
      빈 공간을 드래그하면 새 박스를 그릴 수 있습니다.
    </div>
    <div class="canvas-wrap" id="canvasWrap">
      <img id="targetImg" src="images/proof/진천치과.png" alt="편집 이미지" draggable="false" />
      <div class="blur-overlay" id="blurOverlay">
        <div class="resize-handle nw" data-dir="nw"></div>
        <div class="resize-handle n"  data-dir="n"></div>
        <div class="resize-handle ne" data-dir="ne"></div>
        <div class="resize-handle e"  data-dir="e"></div>
        <div class="resize-handle se" data-dir="se"></div>
        <div class="resize-handle s"  data-dir="s"></div>
        <div class="resize-handle sw" data-dir="sw"></div>
        <div class="resize-handle w"  data-dir="w"></div>
      </div>
    </div>
  </div>

  <!-- 사이드바 -->
  <aside class="sidebar">

    <!-- 슬라이더 좌표 조정 -->
    <div class="sidebar-section">
      <h3><i class="fas fa-sliders-h"></i> 좌표 조정</h3>
      <div class="coord-group">
        <div class="coord-row">
          <div class="coord-label">
            <span>Top (상단 %)</span>
            <span class="coord-val" id="valTop">34.2%</span>
          </div>
          <input type="range" id="slTop" min="0" max="95" step="0.1" value="34.2" />
        </div>
        <div class="coord-row">
          <div class="coord-label">
            <span>Left (왼쪽 %)</span>
            <span class="coord-val" id="valLeft">7.3%</span>
          </div>
          <input type="range" id="slLeft" min="0" max="95" step="0.1" value="7.3" />
        </div>
        <div class="coord-row">
          <div class="coord-label">
            <span>Width (너비 %)</span>
            <span class="coord-val" id="valWidth">39.3%</span>
          </div>
          <input type="range" id="slWidth" min="1" max="99" step="0.1" value="39.3" />
        </div>
        <div class="coord-row">
          <div class="coord-label">
            <span>Height (높이 %)</span>
            <span class="coord-val" id="valHeight">10.7%</span>
          </div>
          <input type="range" id="slHeight" min="1" max="99" step="0.1" value="10.7" />
        </div>
      </div>

      <!-- 숫자 직접 입력 -->
      <div class="coord-input-row" style="margin-top:16px;">
        <div class="coord-input-item">
          <label>Top %</label>
          <input type="number" id="numTop" min="0" max="95" step="0.1" value="34.2" />
        </div>
        <div class="coord-input-item">
          <label>Left %</label>
          <input type="number" id="numLeft" min="0" max="95" step="0.1" value="7.3" />
        </div>
        <div class="coord-input-item">
          <label>Width %</label>
          <input type="number" id="numWidth" min="1" max="99" step="0.1" value="39.3" />
        </div>
        <div class="coord-input-item">
          <label>Height %</label>
          <input type="number" id="numHeight" min="1" max="99" step="0.1" value="10.7" />
        </div>
      </div>
    </div>

    <!-- 생성된 코드 -->
    <div class="sidebar-section">
      <h3><i class="fas fa-code"></i> HTML 코드 (복사 후 naver-place.html에 붙여넣기)</h3>
      <div class="code-box" id="codeBox">
        <span class="prop-name">style=</span><span class="prop-val">"top:34.2%;left:7.3%;width:39.3%;height:10.7%"</span>
      </div>
      <button class="btn-copy" id="btnCopy">
        <i class="fas fa-copy"></i> style 값 복사
      </button>
      <button class="btn-preview" id="btnPreview">
        <i class="fas fa-eye"></i> 블러 미리보기
      </button>
    </div>

    <!-- 현재 좌표 저장 -->
    <div class="sidebar-section">
      <h3><i class="fas fa-save"></i> 현재 이미지 저장</h3>
      <p style="font-size:.78rem;color:#64748b;margin-bottom:12px;">조정 완료 후 저장하면 목록에 기록됩니다.</p>
      <button class="btn-apply" id="btnSaveCurrent">
        <i class="fas fa-check"></i> 현재 이미지 좌표 저장
      </button>
    </div>

    <!-- 전체 이미지 좌표 목록 -->
    <div class="sidebar-section" style="flex:1;">
      <h3><i class="fas fa-list"></i> 전체 이미지 좌표</h3>
      <div class="coord-list" id="coordList"></div>
    </div>

    <!-- 전체 저장 -->
    <button class="btn-save-all" id="btnSaveAll">
      <i class="fas fa-file-export"></i> 전체 코드 복사 (naver-place.html 일괄 적용)
    </button>
    <div style="height:20px;"></div>

  </aside>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   블러 박스 좌표 에디터
   - 이미지 위에서 드래그로 블러 박스 이동/크기 조정
   - 슬라이더 & 숫자 입력으로 정밀 조정
   - style 값 복사 → naver-place.html에 붙여넣기
============================================================ */

/* ── 이미지별 초기 좌표 (naver-place.html 현재값) ── */
var COORDS = {
  '판교치과':   { top: 39.9, left: 53.7, width: 40.0, height: 12.7 },
  '길동역치과': { top: 55.7, left: 5.7,  width: 41.6, height: 12.0 },
  '가락동치과': { top: 38.8, left: 54.5, width: 40.2, height: 12.3 },
  '진천치과':   { top: 34.2, left: 7.3,  width: 39.3, height: 10.7 },
  '수유역치과': { top: 58.4, left: 53.6, width: 40.4, height: 10.1 },
  '명일동치과': { top: 59.9, left: 54.1, width: 39.8, height: 10.6 },
  '광명피부과': { top: 37.0, left: 54.0, width: 41.7, height: 9.2  }
};

/* ── 저장된 좌표 (편집 후) ── */
var SAVED = JSON.parse(JSON.stringify(COORDS)); // 딥카피

var currentImg  = '진천치과';
var isDragging  = false;
var isResizing  = false;
var resizeDir   = '';
var dragStartX  = 0, dragStartY = 0;
var startTop    = 0, startLeft = 0, startWidth = 0, startHeight = 0;

/* DOM */
var imgEl      = document.getElementById('targetImg');
var overlay    = document.getElementById('blurOverlay');
var canvasWrap = document.getElementById('canvasWrap');
var slTop      = document.getElementById('slTop');
var slLeft     = document.getElementById('slLeft');
var slWidth    = document.getElementById('slWidth');
var slHeight   = document.getElementById('slHeight');
var numTop     = document.getElementById('numTop');
var numLeft    = document.getElementById('numLeft');
var numWidth   = document.getElementById('numWidth');
var numHeight  = document.getElementById('numHeight');
var valTop     = document.getElementById('valTop');
var valLeft    = document.getElementById('valLeft');
var valWidth   = document.getElementById('valWidth');
var valHeight  = document.getElementById('valHeight');
var codeBox    = document.getElementById('codeBox');

/* ── 현재 좌표 객체 ── */
function getCoord() {
  return SAVED[currentImg];
}

/* ── UI 전체 동기화 ── */
function syncUI(c) {
  c = c || getCoord();
  var t = round1(c.top), l = round1(c.left),
      w = round1(c.width), h = round1(c.height);

  slTop.value    = t;  numTop.value    = t;  valTop.textContent    = t + '%';
  slLeft.value   = l;  numLeft.value   = l;  valLeft.textContent   = l + '%';
  slWidth.value  = w;  numWidth.value  = w;  valWidth.textContent  = w + '%';
  slHeight.value = h;  numHeight.value = h;  valHeight.textContent = h + '%';

  updateOverlay(c);
  updateCode(c);
  renderCoordList();
}

/* ── 오버레이 위치/크기 갱신 ── */
function updateOverlay(c) {
  var imgRect = imgEl.getBoundingClientRect();
  var wrapRect = canvasWrap.getBoundingClientRect();
  var iw = imgEl.offsetWidth;
  var ih = imgEl.offsetHeight;

  overlay.style.left   = round1(c.left)   + '%';
  overlay.style.top    = round1(c.top)    + '%';
  overlay.style.width  = round1(c.width)  + '%';
  overlay.style.height = round1(c.height) + '%';
}

/* ── 코드 박스 갱신 ── */
function updateCode(c) {
  c = c || getCoord();
  var t = round1(c.top), l = round1(c.left),
      w = round1(c.width), h = round1(c.height);
  var val = 'top:' + t + '%;left:' + l + '%;width:' + w + '%;height:' + h + '%';
  codeBox.innerHTML =
    '<span class="prop-name">style=</span>' +
    '<span class="prop-val">"' + val + '"</span>';
}

function round1(v) { return Math.round(v * 10) / 10; }

/* ── 이미지 선택 변경 ── */
document.getElementById('imgSelect').addEventListener('change', function(e) {
  currentImg = e.target.value;
  imgEl.src = 'images/proof/' + currentImg + '.png';
  imgEl.onload = function() { syncUI(); };
  if (imgEl.complete) syncUI();
});

/* ── 슬라이더 → 숫자 동기화 ── */
function bindSlider(sl, num, valEl, prop) {
  function onChange() {
    var v = parseFloat(sl.value);
    SAVED[currentImg][prop] = v;
    num.value = v;
    valEl.textContent = round1(v) + '%';
    updateOverlay(getCoord());
    updateCode();
  }
  sl.addEventListener('input', onChange);
  sl.addEventListener('change', onChange);
}
function bindNum(num, sl, valEl, prop) {
  function onChange() {
    var v = parseFloat(num.value);
    if (isNaN(v)) return;
    v = Math.max(parseFloat(num.min), Math.min(parseFloat(num.max), v));
    SAVED[currentImg][prop] = v;
    sl.value = v;
    valEl.textContent = round1(v) + '%';
    updateOverlay(getCoord());
    updateCode();
  }
  num.addEventListener('input', onChange);
  num.addEventListener('change', onChange);
}

bindSlider(slTop,    numTop,    valTop,    'top');
bindSlider(slLeft,   numLeft,   valLeft,   'left');
bindSlider(slWidth,  numWidth,  valWidth,  'width');
bindSlider(slHeight, numHeight, valHeight, 'height');
bindNum(numTop,    slTop,    valTop,    'top');
bindNum(numLeft,   slLeft,   valLeft,   'left');
bindNum(numWidth,  slWidth,  valWidth,  'width');
bindNum(numHeight, slHeight, valHeight, 'height');

/* ── 드래그로 오버레이 이동 ── */
overlay.addEventListener('mousedown', function(e) {
  if (e.target.classList.contains('resize-handle')) return;
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  var c = getCoord();
  startTop  = c.top;
  startLeft = c.left;
  e.preventDefault();
});

/* ── 리사이즈 핸들 ── */
overlay.querySelectorAll('.resize-handle').forEach(function(handle) {
  handle.addEventListener('mousedown', function(e) {
    isResizing = true;
    resizeDir  = handle.dataset.dir;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    var c = getCoord();
    startTop    = c.top;
    startLeft   = c.left;
    startWidth  = c.width;
    startHeight = c.height;
    e.preventDefault();
    e.stopPropagation();
  });
});

/* ── 새 박스 그리기 (캔버스 빈 영역 클릭&드래그) ── */
var isDrawing = false;
var drawStartX = 0, drawStartY = 0;
canvasWrap.addEventListener('mousedown', function(e) {
  if (e.target === overlay || overlay.contains(e.target)) return;
  if (e.target !== imgEl && e.target !== canvasWrap) return;
  isDrawing = true;
  var rect = canvasWrap.getBoundingClientRect();
  var iw = imgEl.offsetWidth, ih = imgEl.offsetHeight;
  var imgOffX = (canvasWrap.offsetWidth  - iw) / 2;
  var imgOffY = (canvasWrap.offsetHeight - ih) / 2;
  drawStartX = ((e.clientX - rect.left - imgOffX) / iw) * 100;
  drawStartY = ((e.clientY - rect.top  - imgOffY) / ih) * 100;
  e.preventDefault();
});

document.addEventListener('mousemove', function(e) {
  var iw = imgEl.offsetWidth, ih = imgEl.offsetHeight;
  var wrapRect = canvasWrap.getBoundingClientRect();
  var pctX = ((e.clientX - wrapRect.left) / iw) * 100;
  var pctY = ((e.clientY - wrapRect.top ) / ih) * 100;

  if (isDragging) {
    var dx = ((e.clientX - dragStartX) / iw) * 100;
    var dy = ((e.clientY - dragStartY) / ih) * 100;
    var c = getCoord();
    c.top  = clamp(startTop  + dy, 0, 100 - c.height);
    c.left = clamp(startLeft + dx, 0, 100 - c.width);
    syncUI(c);
  }

  if (isResizing) {
    var dx2 = ((e.clientX - dragStartX) / iw) * 100;
    var dy2 = ((e.clientY - dragStartY) / ih) * 100;
    var c2 = getCoord();
    var t = startTop, l = startLeft, w = startWidth, h = startHeight;

    if (resizeDir.includes('n')) { t = clamp(startTop + dy2, 0, startTop + startHeight - 2); h = startHeight - (t - startTop); }
    if (resizeDir.includes('s')) { h = clamp(startHeight + dy2, 2, 100 - startTop); }
    if (resizeDir.includes('w')) { l = clamp(startLeft + dx2, 0, startLeft + startWidth - 2); w = startWidth - (l - startLeft); }
    if (resizeDir.includes('e')) { w = clamp(startWidth + dx2, 2, 100 - startLeft); }

    c2.top = t; c2.left = l; c2.width = w; c2.height = h;
    syncUI(c2);
  }

  if (isDrawing) {
    var imgOffX2 = (canvasWrap.offsetWidth  - iw) / 2;
    var imgOffY2 = (canvasWrap.offsetHeight - ih) / 2;
    var curX = ((e.clientX - wrapRect.left - imgOffX2) / iw) * 100;
    var curY = ((e.clientY - wrapRect.top  - imgOffY2) / ih) * 100;
    var c3 = getCoord();
    c3.left   = Math.min(drawStartX, curX);
    c3.top    = Math.min(drawStartY, curY);
    c3.width  = Math.abs(curX - drawStartX);
    c3.height = Math.abs(curY - drawStartY);
    syncUI(c3);
  }
});

document.addEventListener('mouseup', function() {
  isDragging = false;
  isResizing = false;
  isDrawing  = false;
});

function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

/* ── 복사 버튼 ── */
document.getElementById('btnCopy').addEventListener('click', function() {
  var c = getCoord();
  var val = 'top:' + round1(c.top) + '%;left:' + round1(c.left) + '%;width:' + round1(c.width) + '%;height:' + round1(c.height) + '%';
  copyText(val);
  var btn = this;
  btn.classList.add('copied');
  btn.innerHTML = '<i class="fas fa-check"></i> 복사됨!';
  showToast('클립보드에 복사되었습니다 ✓');
  setTimeout(function() {
    btn.classList.remove('copied');
    btn.innerHTML = '<i class="fas fa-copy"></i> style 값 복사';
  }, 2000);
});

/* ── 블러 미리보기 ── */
document.getElementById('btnPreview').addEventListener('click', function() {
  var existing = document.getElementById('previewCanvas');
  if (existing) { existing.remove(); showToast('미리보기 닫기'); return; }

  var c = getCoord();
  var natW = imgEl.naturalWidth, natH = imgEl.naturalHeight;
  if (!natW) { showToast('이미지 로드 대기 중...'); return; }

  var rx = Math.round(c.left   / 100 * natW);
  var ry = Math.round(c.top    / 100 * natH);
  var rw = Math.round(c.width  / 100 * natW);
  var rh = Math.round(c.height / 100 * natH);
  rw = Math.min(rw, natW - rx); rh = Math.min(rh, natH - ry);

  var offC = document.createElement('canvas');
  offC.width = natW; offC.height = natH;
  var offCtx = offC.getContext('2d', { willReadFrequently: true });
  offCtx.drawImage(imgEl, 0, 0, natW, natH);
  blurRegion(offCtx, rx, ry, rw, rh, 18, 3);

  var previewCanvas = document.createElement('canvas');
  previewCanvas.id = 'previewCanvas';
  previewCanvas.width  = natW;
  previewCanvas.height = natH;
  previewCanvas.className = 'preview-canvas';
  var pCtx = previewCanvas.getContext('2d');
  pCtx.drawImage(offC, 0, 0);
  document.querySelector('.canvas-panel').appendChild(previewCanvas);
  showToast('블러 미리보기 — 다시 클릭하면 닫힘');
});

/* ── 현재 저장 ── */
document.getElementById('btnSaveCurrent').addEventListener('click', function() {
  renderCoordList();
  showToast('✓ ' + currentImg + ' 좌표 저장됨');
});

/* ── 전체 코드 복사 ── */
document.getElementById('btnSaveAll').addEventListener('click', function() {
  var lines = [];
  Object.keys(SAVED).forEach(function(name) {
    var c = SAVED[name];
    lines.push('/* ' + name + ' */');
    lines.push('style="top:' + round1(c.top) + '%;left:' + round1(c.left) + '%;width:' + round1(c.width) + '%;height:' + round1(c.height) + '%"');
    lines.push('');
  });
  copyText(lines.join('\n'));
  showToast('전체 좌표 코드가 클립보드에 복사되었습니다!');
});

/* ── 좌표 목록 렌더 ── */
function renderCoordList() {
  var list = document.getElementById('coordList');
  list.innerHTML = '';
  Object.keys(SAVED).forEach(function(name) {
    var c = SAVED[name];
    var item = document.createElement('div');
    item.className = 'coord-list-item' + (name === currentImg ? ' current' : '');
    item.innerHTML =
      '<span class="item-name">' + name + '</span>' +
      '<span class="item-coords">top:' + round1(c.top) + '% left:' + round1(c.left) +
      '% w:' + round1(c.width) + '% h:' + round1(c.height) + '%</span>';
    item.addEventListener('click', function() {
      document.getElementById('imgSelect').value = name;
      currentImg = name;
      imgEl.src = 'images/proof/' + name + '.png';
      imgEl.onload = function() { syncUI(); };
      if (imgEl.complete) syncUI();
      renderCoordList();
    });
    list.appendChild(item);
  });
}

/* ── 박스 블러 (미리보기용) ── */
function blurRegion(ctx, rx, ry, rw, rh, r, passes) {
  for (var p = 0; p < passes; p++) {
    var d = ctx.getImageData(rx, ry, rw, rh);
    blurH(d.data, rw, rh, r); ctx.putImageData(d, rx, ry);
    d = ctx.getImageData(rx, ry, rw, rh);
    blurV(d.data, rw, rh, r); ctx.putImageData(d, rx, ry);
  }
}
function blurH(data, w, h, r) {
  for (var y=0;y<h;y++) for (var x=0;x<w;x++) {
    var rs=0,gs=0,bs=0,cnt=0;
    for (var dx=-r;dx<=r;dx++){var nx=Math.min(w-1,Math.max(0,x+dx));var i=(y*w+nx)*4;rs+=data[i];gs+=data[i+1];bs+=data[i+2];cnt++;}
    var i2=(y*w+x)*4;data[i2]=rs/cnt|0;data[i2+1]=gs/cnt|0;data[i2+2]=bs/cnt|0;
  }
}
function blurV(data, w, h, r) {
  for (var x=0;x<w;x++) for (var y=0;y<h;y++) {
    var rs=0,gs=0,bs=0,cnt=0;
    for (var dy=-r;dy<=r;dy++){var ny=Math.min(h-1,Math.max(0,y+dy));var i=(ny*w+x)*4;rs+=data[i];gs+=data[i+1];bs+=data[i+2];cnt++;}
    var i2=(y*w+x)*4;data[i2]=rs/cnt|0;data[i2+1]=gs/cnt|0;data[i2+2]=bs/cnt|0;
  }
}

/* ── 클립보드 복사 ── */
function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(function() { fallbackCopy(text); });
  } else { fallbackCopy(text); }
}
function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

/* ── 토스트 ── */
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

/* ── 초기화 ── */
imgEl.onload = function() { syncUI(); };
if (imgEl.complete && imgEl.naturalWidth > 0) { syncUI(); }
renderCoordList();
</script>
